<!DOCTYPE html>
<html ng-app="learnAnomalyApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnAnomalyDetect - AI Student Performance Analytics</title>
    
    <!-- Bootstrap CSS (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Chart.js (optional, for charts later) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#!/">
                <strong>🤖 LearnAnomalyDetect</strong> - AI Student Performance Analytics
            </a>
            <div class="nav-item">
                <span class="badge badge-danger" ng-show="anomalyCount > 0">
                    {{ anomalyCount }} Active Alerts
                </span>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <!-- Main Navigation -->
        <div class="row mb-3">
            <div class="col-12">
                <ul class="nav nav-tabs">
                    <li class="nav-item">
                        <a class="nav-link" href="#!/">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#!/students">Students</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#!/anomalies">Anomalies</a>
                    </li>
                </ul>
            </div>
        </div>

        <!-- View Container -->
        <div class="row">
            <div class="col-12">
                <div ng-view></div>
            </div>
        </div>
    </div>

    <!-- AngularJS -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-resource.min.js"></script>
    
    <!-- Bootstrap JS (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- App Scripts -->
    <script src="js/app.js"></script>
    <script src="js/services/api.service.js"></script>
    <script src="js/controllers/main.controller.js"></script>
    
    <footer class="mt-5 mb-3 text-center text-muted">
        <p>&copy; 2026 LearnAnomalyDetect - Real-time AI Anomaly Detection Platform</p>
    </footer>
</body>
</html>
